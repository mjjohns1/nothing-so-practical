baseURL: "https://nothing-so-practical.com/"
enableRobotsTXT: true
languageCode: "en-us"
title: "Nothing So Practical"
theme: "hugo-theme-cleanwhite"

pagination:
  pagerSize: 5

params:
  # header_image: "img/home-bg.jpg"
  SEOTitle: "Nothing So Practical"
  description: "Data Science, Statistics, Research Methods, Psychological Science, Epidemiology"
  # slogan: "Practical makes perfect"
  keyword: "data science, causal inference, statistics, research methods, psychology, epidemiology"

  sidebar_about_description: "A practical approach to data science, statistics, research methods, and beyond."
  # sidebar_avatar: "img/avatar.jpg"   # place image in static/img/

  featured_tags: true
  featured_condition_size: 1

  about_me: false
  friends: false
  bookmarks: false
  last_posts: true

  custom_css: ["css/custom.css"]

  additional_menus:
    - title: "ABOUT"
      href: "/about"
    - title: "STUFF WE LIKE"
      href: "/reading"
    - title: "ARCHIVE"
      href: "/archive"

  omit_categories: true
  hide_all_posts: true

  auto_theme: false
  dark_mode_toggle: false

  social:
    rss: true
    email: "nothing.so.practical.blog@gmail.com"
    # github: "https://github.com/youruser"
    # linkedin: "https://www.linkedin.com/in/yourprofile"
    # bluesky: "https://bsky.app/profile/handle.bsky.social"

mediaTypes:
  font/woff:
    suffixes:
      - woff
  font/woff2:
    suffixes:
      - woff2

markup:
  highlight:
    style: "dracula"
    lineNos: false
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - - $$
              - $$
          inline:
            - - $
              - $
  tableOfContents:
    startLevel: 1
    endLevel: 3
